name: Release

# Publishes a GitHub Release. HACS watches releases to show "update available",
# so shipping an update is: bump manifest.json version, then either push a
# vX.Y.Z tag or run this workflow manually with the tag as input.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, e.g. v1.0.1"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            gh release create "$TAG" --target "${{ github.sha }}" --title "$TAG" --generate-notes
          else
            TAG="${GITHUB_REF_NAME}"
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
