name: Release

# Publishes a GitHub Release automatically whenever a version tag (vX.Y.Z) is
# pushed. That release is what HACS watches to show "update available", so the
# whole update flow becomes: bump manifest.json version -> tag -> push tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --generate-notes
